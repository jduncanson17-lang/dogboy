<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dog Boy" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="description" content="The AI companion that actually knows your dog." />
  <title>Dog Boy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
    body{font-family:'Inter',sans-serif;background:#fffbeb;color:#1c1917;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#d6c8aa;border-radius:4px;}

    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}
    @keyframes shimmer{0%{background-position:-200px 0;}100%{background-position:calc(200px + 100%) 0;}}
    @keyframes splashPaw{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.2) rotate(5deg);opacity:1;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
    @keyframes dashRotate{to{stroke-dashoffset:0;}}
    @keyframes gradientShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
    @keyframes cardSlideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}

    .fade-up{animation:fadeUp .4s ease both;}
    .fade-in{animation:fadeIn .3s ease both;}
    .slide-up{animation:slideUp .5s cubic-bezier(.16,1,.3,1) both;}
    .d1{animation-delay:.05s;}.d2{animation-delay:.1s;}.d3{animation-delay:.18s;}.d4{animation-delay:.26s;}.d5{animation-delay:.34s;}

    /* SPLASH */
    .splash{position:fixed;inset:0;background:linear-gradient(135deg,#fef3c7,#f59e0b,#d97706);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease;}
    .splash.hidden{opacity:0;pointer-events:none;}
    .splash-paw{font-size:80px;animation:splashPaw .7s cubic-bezier(.16,1,.3,1) both;}
    .splash-text{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;margin-top:16px;animation:fadeIn .5s .4s both;}
    .splash-sub{font-size:15px;color:rgba(255,255,255,.8);margin-top:6px;animation:fadeIn .5s .6s both;}
    .splash-loader{width:40px;height:3px;background:rgba(255,255,255,.3);border-radius:3px;margin-top:32px;overflow:hidden;animation:fadeIn .5s .7s both;}
    .splash-loader-bar{height:100%;background:#fff;border-radius:3px;animation:shimmer 1.2s .8s ease forwards;background-size:400px 100%;width:0%;animation:grow 1.5s .8s ease forwards;}
    @keyframes grow{to{width:100%;}}

    /* APP SHELL */
    .app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:#f8f4ee;position:relative;overflow:hidden;}
    .app-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch;}

    /* BOTTOM NAV */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0e8d6;display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.06);z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 2px;font-family:inherit;transition:transform .15s;}
    .nav-item:active{transform:scale(.92);}
    .nav-icon{font-size:22px;transition:transform .2s;}
    .nav-label{font-size:10px;font-weight:600;color:#a8a29e;transition:color .2s;}
    .nav-item.active .nav-label{color:#f59e0b;}
    .nav-item.active .nav-icon{transform:scale(1.15);}
    .nav-dot{width:5px;height:5px;border-radius:50%;background:#f59e0b;position:absolute;top:-1px;}

    /* HEADER */
    .top-header{background:#fff;padding:16px 20px 12px;padding-top:calc(16px + env(safe-area-inset-top));border-bottom:1px solid #f0e8d6;position:sticky;top:0;z-index:50;}

    /* BUTTONS */
    .btn{border:none;border-radius:12px;font-family:inherit;cursor:pointer;font-weight:700;transition:all .15s;}
    .btn-primary{background:#f59e0b;color:#fff;padding:14px 24px;font-size:15px;}
    .btn-primary:hover{background:#d97706;transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,158,11,.35);}
    .btn-primary:active{transform:translateY(0);}
    .btn-secondary{background:#fff;color:#1c1917;border:2px solid #e7dfc8;padding:12px 22px;font-size:14px;}
    .btn-secondary:hover{border-color:#f59e0b;color:#92400e;}
    .btn-sm{background:#f59e0b;color:#fff;padding:9px 16px;font-size:13px;border:none;border-radius:9px;font-family:inherit;cursor:pointer;font-weight:700;transition:all .15s;}
    .btn-sm:hover{background:#d97706;}
    .btn-ghost-sm{background:transparent;border:1.5px solid #e7dfc8;color:#78350f;padding:7px 14px;font-size:12.5px;border-radius:8px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .15s;}
    .btn-ghost-sm:hover{border-color:#f59e0b;background:#fffbeb;}
    .btn-danger{background:#fee2e2;color:#991b1b;padding:9px 16px;font-size:13px;border:none;border-radius:9px;font-family:inherit;cursor:pointer;font-weight:700;transition:all .15s;}
    .btn-danger:hover{background:#fecaca;}

    /* CARDS */
    .card{background:#fff;border-radius:18px;border:1px solid #f0e8d6;box-shadow:0 2px 16px rgba(0,0,0,.05);}
    .card-section{background:#fff;border-radius:18px;border:1px solid #f0e8d6;margin:0 16px 14px;overflow:hidden;}

    /* INPUT */
    .input{width:100%;border:2px solid #e7dfc8;border-radius:12px;padding:12px 16px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff;color:#1c1917;}
    .input:focus{border-color:#f59e0b;}
    .input-sm{border:1.5px solid #e7dfc8;border-radius:9px;padding:9px 13px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#1c1917;transition:border-color .15s;}
    .input-sm:focus{border-color:#f59e0b;}

    /* CHAT */
    .chat-messages{padding:16px;display:flex;flex-direction:column;gap:12px;}
    .bubble-user{background:#f59e0b;color:#fff;border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:78%;align-self:flex-end;font-size:14px;line-height:1.5;}
    .bubble-ai{background:#fff;color:#1c1917;border-radius:18px 18px 18px 4px;padding:13px 16px;max-width:84%;border:1px solid #f0e8d6;line-height:1.65;font-size:14px;}
    .chat-input-bar{background:#fff;border-top:1px solid #f0e8d6;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));display:flex;gap:9px;align-items:flex-end;position:sticky;bottom:0;}
    .chat-textarea{flex:1;border:2px solid #e7dfc8;border-radius:22px;padding:10px 16px;font-size:14px;font-family:inherit;outline:none;background:#fffbeb;color:#1c1917;resize:none;max-height:100px;line-height:1.5;}
    .chat-textarea:focus{border-color:#f59e0b;}
    .send-btn{width:42px;height:42px;border-radius:50%;background:#f59e0b;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
    .send-btn:hover{background:#d97706;transform:scale(1.05);}
    .send-btn:disabled{background:#e7dfc8;cursor:not-allowed;transform:none;}
    .typing-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#a8a29e;animation:bounce 1.3s infinite;margin:0 2px;}
    .typing-dot:nth-child(2){animation-delay:.18s;}
    .typing-dot:nth-child(3){animation-delay:.36s;}

    /* CHIPS */
    .chip{background:#fff;border:1.5px solid #f0e8d6;border-radius:20px;padding:7px 13px;font-size:12.5px;color:#78350f;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;}
    .chip:hover,.chip:active{background:#fef3c7;border-color:#f59e0b;}

    /* ONBOARDING */
    .onboarding{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:#fffbeb;}
    .step-dot{height:8px;border-radius:50%;background:#e7dfc8;transition:all .3s;}
    .step-dot.active{background:#f59e0b;width:24px;border-radius:4px;}
    .step-dot.done{background:#f59e0b;width:8px;}
    .breed-opt{padding:10px 14px;border-radius:10px;border:2px solid #f0e8d6;cursor:pointer;font-size:13.5px;transition:all .15s;background:#fff;}
    .breed-opt:hover,.breed-opt.sel{border-color:#f59e0b;background:#fef3c7;color:#78350f;font-weight:600;}
    .trait-tag{background:#fef3c7;color:#78350f;border-radius:20px;padding:7px 15px;font-size:13px;font-weight:500;border:2px solid transparent;cursor:pointer;transition:all .15s;}
    .trait-tag.sel{background:#f59e0b;color:#fff;border-color:#d97706;}

    /* HEALTH SCORE RING */
    .score-ring{transform:rotate(-90deg);}
    .score-track{fill:none;stroke:#f0e8d6;stroke-width:8;}
    .score-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1);}

    /* VACCINE STATUS BADGES */
    .badge-ok{background:#dcfce7;color:#166534;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
    .badge-due{background:#fef3c7;color:#92400e;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
    .badge-overdue{background:#fee2e2;color:#991b1b;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
    .badge-unknown{background:#f3f4f6;color:#6b7280;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
    .badge-blue{background:#e0f2fe;color:#0369a1;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}

    /* PRODUCT CARD */
    .product-card{background:#fff;border-radius:16px;border:1px solid #f0e8d6;padding:16px;transition:all .15s;}
    .product-card:hover{border-color:#f59e0b;box-shadow:0 4px 20px rgba(245,158,11,.1);}

    /* HOME GRADIENT CARD */
    .gradient-card{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);border-radius:20px;padding:20px;color:#fff;margin:0 16px 14px;}
    .stat-mini{background:rgba(255,255,255,.18);border-radius:10px;padding:10px 14px;backdrop-filter:blur(4px);}

    /* QUICK ACTION */
    .quick-action{background:#fff;border-radius:16px;border:1px solid #f0e8d6;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .15s;text-align:center;}
    .quick-action:hover{border-color:#f59e0b;background:#fffbeb;transform:translateY(-2px);box-shadow:0 4px 16px rgba(245,158,11,.15);}
    .quick-action:active{transform:translateY(0);}

    /* TIP CARD */
    .tip-card{background:linear-gradient(135deg,#1c1917,#292524);border-radius:18px;padding:20px;margin:0 16px 14px;color:#fff;}

    /* SECTION LABEL */
    .section-label{font-size:12px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.6px;padding:0 16px;margin-bottom:10px;margin-top:6px;}

    /* LANDING */
    .hero-bg{background:linear-gradient(160deg,#fffbeb 0%,#fef3c7 40%,#fde68a 100%);}
    .pricing-card{background:#fff;border-radius:22px;padding:28px;border:2px solid #f0e8d6;}
    .pricing-card.featured{border-color:#f59e0b;background:#fffbeb;}
    .testimonial-card{background:#fff;border-radius:16px;padding:22px;border:1px solid #f0e8d6;}

    /* PROGRESS BAR */
    .progress-bar-track{background:#f0e8d6;border-radius:99px;height:6px;overflow:hidden;}
    .progress-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#f59e0b,#d97706);transition:width 1s cubic-bezier(.16,1,.3,1);}

    /* EMERGENCY */
    .emergency-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:16px;padding:16px 20px;width:100%;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;box-shadow:0 4px 20px rgba(239,68,68,.3);}
    .emergency-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(239,68,68,.4);}
    .emergency-btn:active{transform:translateY(0);}

    @media(max-width:600px){.hide-mobile{display:none;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useMemo}=React;

// ──────────────────────────────────────────────
// DATA & ENGINES
// ──────────────────────────────────────────────
const BREEDS=["Labrador Retriever","Golden Retriever","French Bulldog","German Shepherd","Poodle","Bulldog","Beagle","Rottweiler","Yorkshire Terrier","Dachshund","Boxer","Siberian Husky","Shih Tzu","Great Dane","Doberman","Chihuahua","Maltese","Corgi","Border Collie","Australian Shepherd","Morkie","Chihuahua mix","Rat Terrier mix","Terrier mix","Rescue mix","Pit Bull mix","Goldendoodle","Labradoodle","Pomeranian","Cavapoo"];
const TRAITS=["Energetic","Chill","Anxious","Playful","Stubborn","Protective","Shy","Social butterfly","Food motivated","Cuddly","Independent","Velcro dog"];
const DEFAULT_VACCINES=[
  {id:1,name:"Rabies",required:true,frequency:"1–3 years",lastGiven:"",nextDue:"",notes:""},
  {id:2,name:"DHPP (Distemper, Parvo, Adenovirus)",required:true,frequency:"1–3 years",lastGiven:"",nextDue:"",notes:""},
  {id:3,name:"Bordetella (Kennel Cough)",required:false,frequency:"6–12 months",lastGiven:"",nextDue:"",notes:""},
  {id:4,name:"Leptospirosis",required:false,frequency:"Annual",lastGiven:"",nextDue:"",notes:""},
  {id:5,name:"Lyme Disease",required:false,frequency:"Annual",lastGiven:"",nextDue:"",notes:""},
  {id:6,name:"Canine Influenza",required:false,frequency:"Annual",lastGiven:"",nextDue:"",notes:""},
];

function humanYears(dogAge,weight){
  const w=parseInt(weight)||20,a=parseInt(dogAge)||1;
  if(a<=0)return 0;
  if(a===1)return w<20?15:w<50?15:12;
  if(a===2)return w<20?24:w<50?24:22;
  const perYear=w<20?4:w<50?5:7;
  return(w<20?24:24)+(a-2)*perYear;
}

function calcHealthScore(vaccines,vetInfo,meds,logs){
  let score=50;
  const withDates=vaccines.filter(v=>v.nextDue);
  if(withDates.length>=2)score+=10;
  const overdue=vaccines.filter(v=>v.nextDue&&(new Date(v.nextDue)-new Date())<0).length;
  if(overdue===0&&withDates.length>0)score+=10;
  if(vetInfo.name)score+=8;
  if(vetInfo.nextAppt)score+=8;
  if(meds.length>0)score+=5;
  if(logs.length>=3)score+=9;
  return Math.min(score,100);
}

function scoreColor(s){return s>=80?"#10b981":s>=60?"#f59e0b":"#ef4444";}
function scoreLabel(s){return s>=80?"Excellent":s>=60?"Good":"Needs Attention";}

function vaccineStatus(nextDue){
  if(!nextDue)return{label:"Not recorded",cls:"badge-unknown"};
  const diff=(new Date(nextDue)-new Date())/(86400000);
  if(diff<0)return{label:"Overdue",cls:"badge-overdue"};
  if(diff<30)return{label:"Due soon",cls:"badge-due"};
  return{label:"Up to date",cls:"badge-ok"};
}

function getDailyTip(dog){
  const tips=[
    {emoji:"🦷",title:"Dental Health",text:`Brushing ${dog.name}'s teeth 3x per week can add 3–5 years to their life. The enzymatic toothpaste makes it easier — they often love the flavor.`},
    {emoji:"🧠",title:"Mental Stimulation",text:`A 10-minute training session can tire ${dog.name} out more than a 30-minute walk. Their brain needs exercise too.`},
    {emoji:"👃",title:"The Power of Sniff Walks",text:`Let ${dog.name} sniff on walks instead of keeping a brisk pace. For dogs, sniffing IS the walk — it's their way of reading the news.`},
    {emoji:"🥣",title:"Hydration Check",text:`Most dogs need about 1 oz of water per pound of body weight daily. ${dog.weight?`For ${dog.name} at ${dog.weight} lbs, that's around ${Math.round(dog.weight)} oz.`:"Keep fresh water available at all times."}`},
    {emoji:"😴",title:"Rest Matters",text:`Dogs sleep 12–14 hours a day. If ${dog.name} seems more tired than usual, note it in the health log — changes in rest patterns are often the first sign of something worth checking.`},
    {emoji:"❤️",title:"The 3-Second Rule",text:`When ${dog.name} greets you, get down to their level and let them come to you. That simple act builds trust more than most training exercises.`},
    {emoji:"🌡️",title:"Know Their Normal",text:`Take ${dog.name}'s temperature when they're healthy (101–102.5°F is normal) so you have a baseline. A dog with a 103°F+ temp needs a vet call.`},
    {emoji:"🐾",title:"Paw Check",text:`Inspect ${dog.name}'s paws weekly. Look between the toes for cuts, swelling, or signs of allergies like redness. Many dogs lick their paws when something's off.`},
  ];
  const idx=new Date().getDate()%tips.length;
  return tips[idx];
}

function getBreedFact(breed){
  const facts={
    "Chihuahua":["Chihuahuas have the largest brain-to-body ratio of any dog breed.","Despite their size, Chihuahuas are one of the most long-lived breeds — often reaching 15–20 years."],
    "Chihuahua mix":["Chihuahua mixes often inherit the best of both worlds — typically intelligent, alert, and deeply loyal.","Many Chihuahua mixes are 'velcro dogs' — they bond incredibly closely with one person."],
    "Morkie":["Morkies — a Maltese-Yorkshire Terrier mix — are hypoallergenic and low-shedding, great for allergy sufferers.","Despite their small size, Morkies have big personalities and surprising confidence."],
    "Golden Retriever":["Golden Retrievers were bred in Scotland in the 1800s specifically for retrieving waterfowl.","They're consistently ranked as one of the top 3 most popular dog breeds in the US."],
    "Labrador Retriever":["Labs have been the #1 most popular breed in the US for over 30 consecutive years.","Their otter-like tail is a rudder — it helps them steer while swimming."],
    "default":["Dogs can recognize their owner's scent from up to 2 miles away.","Dogs' nose prints are as unique as human fingerprints — no two are the same.","The average dog can learn over 165 words and signals."],
  };
  const f=facts[breed]||facts["default"];
  return f[new Date().getDate()%f.length];
}

// AI Response Engine
function getAI(msg,dog){
  const m=msg.toLowerCase(),n=dog?.name||"your dog",b=dog?.breed||"dog",a=parseInt(dog?.age)||3,t=dog?.traits||[],w=dog?.weight;
  const anxious=t.includes("Anxious"),energetic=t.includes("Energetic");
  if(m.includes("bark")||m.includes("whine")||m.includes("quiet")||m.includes("loud"))
    return `${n} sounds like a communicator! ${b}s can bark for a few reasons — alerting, boredom, anxiety, or just wanting attention.\n\nA useful trick: note *when* the barking happens for 3 days. Morning? When you leave? When people pass? The pattern tells you everything.\n\n${a<2?`Since ${n} is still young, they're learning the rules — consistency is huge right now.`:`At ${a}, ${n} likely has established triggers.`}\n\nWhat does the barking sound like — sharp and alert, or more anxious?`;
  if(m.includes("food")||m.includes("eat")||m.includes("diet")||m.includes("feed")||m.includes("hungry")||m.includes("treat")||m.includes("nutrition"))
    return `Feeding ${n} right is one of the highest-impact choices for their health.\n\nFor a ${b}, look for food where the first ingredient is a named protein — chicken, salmon, beef. Not "meat meal" or corn.\n\n${a<1?`Since ${n} is a puppy, puppy formula is essential — the protein and fat ratios matter a lot.`:a>7?`At ${a}, a senior formula with joint support could be a great upgrade.`:`At ${a}, quality adult formula works great.`}${w?`\n\nFor ${w} lbs, roughly ${Math.round(w*0.025*10)/10} cups of dry food per day is a starting point.`:""}\n\nAny digestive issues, or eating well overall?`;
  if(m.includes("exercise")||m.includes("walk")||m.includes("run")||m.includes("play")||m.includes("energy")||m.includes("hyper")||m.includes("bored"))
    return `${b}s${energetic?` — especially ${n} —`:""} thrive on consistent daily movement. For most dogs ${n}'s size, 45–60 minutes split into a couple sessions works well.\n\nSecret weapon: mental exercise is just as tiring as physical. A sniff walk where ${n} gets to smell everything, or a puzzle feeder at mealtime, can wear them out faster than a sprint.\n\nWhat does ${n}'s typical day look like right now?`;
  if(m.includes("anxi")||m.includes("scared")||m.includes("fear")||m.includes("nervous")||m.includes("shak")||m.includes("stress")||m.includes("separation"))
    return `${anxious?`Since you flagged ${n} as anxious, this makes sense. `:``}Anxiety is real for dogs and worth addressing — it affects their quality of life a lot.\n\nStep one: identify the trigger. Sounds (thunder, fireworks)? Situations (being alone, car rides)? Strangers? Each has a different approach.\n\nMost anxiety responds well to gradual desensitization. Calming supplements (L-theanine, Adaptil) help some dogs. And if it's significant, a vet conversation about meds isn't a last resort — it's a tool.\n\nWhat are you noticing with ${n} specifically?`;
  if(m.includes("sleep")||m.includes("tired")||m.includes("lethargic")||m.includes("lazy"))
    return `Dogs sleep 12–14 hours a day on average — a lot of napping is totally normal.\n\nWhat matters is *change*. If ${n} used to be bouncy and has gotten notably more tired, or seems stiff getting up, that's worth a vet visit.\n\nIs this ${n}'s normal baseline, or something that's shifted recently?`;
  if(m.includes("train")||m.includes("command")||m.includes("behav")||m.includes("listen")||m.includes("sit")||m.includes("stay"))
    return `Training is one of the best investments in your relationship with ${n}. Dogs love having a job and understanding expectations.\n\nThe five that change daily life most: *sit, stay, come, leave it,* and *loose-leash walking*.\n\nFor ${b}s, positive reinforcement consistently beats anything correction-based. Short sessions (5–10 mins), end on a win, make it feel like a game.\n\nIs there a specific behavior you're working on?`;
  if(m.includes("sick")||m.includes("vet")||m.includes("hurt")||m.includes("pain")||m.includes("vomit")||m.includes("poop")||m.includes("limp")||m.includes("blood"))
    return `Your instincts about ${n} are worth trusting.\n\n⚠️ For anything urgent — repeated vomiting, bloody stool, limping, not eating 24+ hrs, labored breathing — please call your vet or use the Emergency Vet button in the Health tab now.\n\nFor non-urgent concerns: note when it started, how often, and if anything changed recently. That makes the vet visit way more productive.\n\nWhat are you seeing with ${n}?`;
  if(m.includes("groom")||m.includes("bath")||m.includes("shed")||m.includes("nail")||m.includes("brush")||m.includes("coat")||m.includes("smell"))
    return `Grooming is both a health thing and a bonding thing. Dogs comfortable with handling are dramatically easier at the vet.\n\nFor a ${b}: nails every 3–4 weeks (clicking floors = time for a trim). Ears weekly for moisture. Teeth are the most overlooked — dental chews daily make a real difference over time.\n\nHow does ${n} do with being handled — feet, ears, brushed?`;
  if(m.includes("shop")||m.includes("product")||m.includes("buy")||m.includes("recommend")||m.includes("what should i get"))
    return `Head to the **Shop tab** for picks I've put together specifically for ${n}! 🛍️\n\nI've curated food, treats, health supplements, and gear based on ${n}'s breed, age, and personality. Everything links straight to Chewy.`;
  const f=[`Great question about ${n}. Every ${b} is a little different — I want to give you something actually useful, not generic advice.\n\nCan you tell me more? When did this start, how often, and has anything changed in ${n}'s routine lately?`,
    `I want to give ${n}-specific help here. A bit more context would help — what exactly are you noticing, and is this new or ongoing?`,
    `You know ${n} better than any article. Let me work with you on this.\n\nWhat prompted the question — something specific you've been noticing?`];
  return f[Math.floor(Math.random()*f.length)];
}

// Breed Care Calendar
function getCareCalendar(dog){
  const month=new Date().getMonth();
  const breed=(dog?.breed||"").toLowerCase();
  const a=parseInt(dog?.age)||2,w=parseInt(dog?.weight)||20;
  const isLongCoat=["shih","maltese","yorkie","poodle","golden","collie","husky","bichon","lhasa","pomeranian","doodle","cavapoo"].some(b=>breed.includes(b));
  const isLarge=w>50,isPuppy=a<1,isSenior=a>=7;
  const spring=[2,3,4],summer=[5,6,7],fall=[8,9,10],winter=[11,0,1];
  const tasks=[
    {emoji:"💊",title:"Flea & tick prevention",freq:"Monthly"},
    {emoji:"❤️",title:"Heartworm prevention",freq:"Monthly"},
    {emoji:"🪥",title:"Brush teeth",freq:"3x/week"},
    {emoji:"✂️",title:"Trim nails",freq:"Every 3–4 weeks"},
    {emoji:"👂",title:"Check & clean ears",freq:"Weekly"},
  ];
  if(isLongCoat){tasks.push({emoji:"✂️",title:"Grooming appointment",freq:"Every 4–6 weeks"});tasks.push({emoji:"🪮",title:"Brush coat",freq:"Daily"});}
  else{tasks.push({emoji:"🪮",title:"Brush coat",freq:"Weekly"});}
  if(isPuppy){tasks.push({emoji:"🐣",title:"Puppy socialization activities",freq:"Weekly"});tasks.push({emoji:"📚",title:"Puppy training class",freq:"Weekly"});}
  if(isSenior){tasks.push({emoji:"🩸",title:"Senior bloodwork check",freq:"Every 6 months"});tasks.push({emoji:"💊",title:"Joint supplement review",freq:"Monthly"});}
  if(isLarge){tasks.push({emoji:"⚠️",title:"Monitor for bloat after meals",freq:"Daily"});}
  if(spring.includes(month)){tasks.push({emoji:"🌸",title:"Annual vet wellness exam",freq:"This month"});tasks.push({emoji:"🌿",title:"Update flea/tick for warmer months",freq:"Now"});}
  if(summer.includes(month)){tasks.push({emoji:"🌡️",title:"Check paws after hot pavement walks",freq:"Daily"});tasks.push({emoji:"💧",title:"Extra hydration monitoring",freq:"Daily"});}
  if(fall.includes(month)){tasks.push({emoji:"🍂",title:"Holiday anxiety prep",freq:"Seasonal"});}
  if(winter.includes(month)){tasks.push({emoji:"🧴",title:"Paw balm for cold/salt walks",freq:"Daily"});tasks.push({emoji:"🛏️",title:"Ensure warm sleeping area",freq:"Seasonal"});}
  return tasks;
}

// Birthday utils
function getBirthdayInfo(birthday){
  if(!birthday)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const bday=new Date(birthday);
  const next=new Date(today.getFullYear(),bday.getMonth(),bday.getDate());
  if(next<today)next.setFullYear(next.getFullYear()+1);
  const days=Math.round((next-today)/86400000);
  return{days,isToday:days===0,isSoon:days<=7};
}

function Onboarding({onDone}){
  const [step,setStep]=useState(1);
  const [d,setD]=useState({name:"",breed:"",age:"",weight:"",sex:"male",traits:[]});
  const [bs,setBs]=useState("");
  const filtered=BREEDS.filter(b=>b.toLowerCase().includes(bs.toLowerCase()));
  const next=()=>setStep(s=>s+1),back=()=>setStep(s=>s-1);
  const toggleTrait=t=>setD(x=>({...x,traits:x.traits.includes(t)?x.traits.filter(v=>v!==t):[...x.traits,t]}));
  const c=()=>{
    if(step===1)return(
      <div className="fade-up">
        <div style={{fontSize:52,marginBottom:14,textAlign:"center"}}>🐕</div>
        <h2 style={{fontSize:26,fontWeight:900,letterSpacing:"-1px",marginBottom:8,textAlign:"center"}}>What's your dog's name?</h2>
        <p style={{fontSize:14,color:"#78350f",marginBottom:26,textAlign:"center"}}>Let's start with what matters most.</p>
        <input className="input" autoFocus placeholder="Biscuit, Luna, Max..." value={d.name} onChange={e=>setD(x=>({...x,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&d.name&&next()} style={{fontSize:20,fontWeight:600,textAlign:"center",marginBottom:16}}/>
        <button className="btn btn-primary" style={{width:"100%",padding:"14px"}} onClick={next} disabled={!d.name}>Continue →</button>
      </div>
    );
    if(step===2)return(
      <div className="fade-up">
        <div style={{fontSize:52,marginBottom:14,textAlign:"center"}}>🔍</div>
        <h2 style={{fontSize:26,fontWeight:900,letterSpacing:"-1px",marginBottom:6,textAlign:"center"}}>What breed is {d.name}?</h2>
        <p style={{fontSize:14,color:"#78350f",marginBottom:20,textAlign:"center"}}>Breed-specific advice is way more useful.</p>
        <input className="input" style={{marginBottom:10}} placeholder="Search or type breed..." value={bs} onChange={e=>{setBs(e.target.value);setD(x=>({...x,breed:e.target.value}));}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,maxHeight:190,overflowY:"auto",marginBottom:16}}>
          {filtered.map(b=><div key={b} className={`breed-opt ${d.breed===b?"sel":""}`} onClick={()=>{setD(x=>({...x,breed:b}));setBs(b);}}>{b}</div>)}
        </div>
        <div style={{display:"flex",gap:10}}><button className="btn btn-secondary" onClick={back} style={{flex:1}}>← Back</button><button className="btn btn-primary" onClick={next} disabled={!d.breed} style={{flex:2,padding:"14px"}}>Continue →</button></div>
      </div>
    );
    if(step===3)return(
      <div className="fade-up">
        <div style={{fontSize:52,marginBottom:14,textAlign:"center"}}>📋</div>
        <h2 style={{fontSize:26,fontWeight:900,letterSpacing:"-1px",marginBottom:6,textAlign:"center"}}>Tell us about {d.name}</h2>
        <p style={{fontSize:14,color:"#78350f",marginBottom:22,textAlign:"center"}}>A few details make everything more accurate.</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div><label style={{fontSize:12,fontWeight:700,color:"#78350f",display:"block",marginBottom:5}}>Age (years)</label><input className="input" type="number" min="0" max="20" placeholder="e.g. 4" value={d.age} onChange={e=>setD(x=>({...x,age:e.target.value}))}/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:"#78350f",display:"block",marginBottom:5}}>Weight (lbs)</label><input className="input" type="number" min="1" max="250" placeholder="e.g. 9" value={d.weight} onChange={e=>setD(x=>({...x,weight:e.target.value}))}/></div>
        </div>
        <label style={{fontSize:12,fontWeight:700,color:"#78350f",display:"block",marginBottom:8}}>Sex</label>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          {["male","female"].map(s=><div key={s} className={`breed-opt ${d.sex===s?"sel":""}`} onClick={()=>setD(x=>({...x,sex:s}))} style={{flex:1,textAlign:"center"}}>{s==="male"?"♂ Male":"♀ Female"}</div>)}
        </div>
        <div style={{display:"flex",gap:10}}><button className="btn btn-secondary" onClick={back} style={{flex:1}}>← Back</button><button className="btn btn-primary" onClick={next} disabled={!d.age} style={{flex:2,padding:"14px"}}>Continue →</button></div>
      </div>
    );
    if(step===4)return(
      <div className="fade-up">
        <div style={{fontSize:52,marginBottom:14,textAlign:"center"}}>✨</div>
        <h2 style={{fontSize:26,fontWeight:900,letterSpacing:"-1px",marginBottom:6,textAlign:"center"}}>What's {d.name} like?</h2>
        <p style={{fontSize:14,color:"#78350f",marginBottom:20,textAlign:"center"}}>Select all that apply.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:26}}>
          {TRAITS.map(t=><span key={t} className={`trait-tag ${d.traits.includes(t)?"sel":""}`} onClick={()=>toggleTrait(t)}>{t}</span>)}
        </div>
        <div style={{display:"flex",gap:10}}><button className="btn btn-secondary" onClick={back} style={{flex:1}}>← Back</button><button className="btn btn-primary" onClick={()=>onDone(d)} style={{flex:2,padding:"14px",fontSize:15}}>Meet {d.name}'s AI 🐾</button></div>
      </div>
    );
  };
  return(
    <div className="onboarding">
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:32}}><span style={{fontSize:22}}>🐾</span><span style={{fontSize:17,fontWeight:900}}>Dog Boy</span></div>
        <div style={{display:"flex",gap:6,marginBottom:32}}>{[1,2,3,4].map(i=><div key={i} className={`step-dot ${i===step?"active":i<step?"done":""}`} style={{width:i===step?24:8}}/>)}</div>
        {c()}
      </div>
    </div>
  );
}

function Dashboard({dog,dogId,sb,user,dogs,onSwitchDog,onReset,onLogout,onSaveComplete}){
  const [tab,setTab]=useState("home");
  const [msgs,setMsgs]=useState([{from:"ai",text:`Hey! 👋 I'm your Dog Boy AI — and I actually know about ${dog.name}.\n\nAsk me anything about behavior, health, food, or training. I give answers based on ${dog.name}'s specific profile, not generic dog advice.\n\nAnd don't miss the **Shop tab** — I've put together personalized product picks based on ${dog.name}'s breed and personality. 🛍️`}]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [vaccines,setVaccines]=useState(DEFAULT_VACCINES);
  const [vacIds,setVacIds]=useState({});
  const [editVax,setEditVax]=useState(null);
  const [meds,setMeds]=useState([]);
  const [showMedForm,setShowMedForm]=useState(false);
  const [newMed,setNewMed]=useState({name:"",dose:"",frequency:"",nextDue:""});
  const [vet,setVet]=useState({name:"",phone:"",address:"",nextAppt:"",reason:""});
  const [vetDbId,setVetDbId]=useState(null);
  const [editVet,setEditVet]=useState(false);
  const [logs,setLogs]=useState([]);
  const [logCat,setLogCat]=useState("Health");
  const [logNote,setLogNote]=useState("");
  const [shopFilter,setShopFilter]=useState("All");
  const msgEnd=useRef(null);

  useEffect(()=>{
    if(!sb||!dogId)return;
    sb.from('vaccines').select('*').eq('dog_id',dogId).then(({data})=>{
      if(data?.length){
        const ids={};
        const mapped=DEFAULT_VACCINES.map(dv=>{
          const found=data.find(d=>d.name===dv.name);
          if(found){ids[dv.id]=found.id;return{...dv,lastGiven:found.last_given||"",nextDue:found.next_due||"",notes:found.notes||""};}
          return dv;
        });
        setVaccines(mapped);setVacIds(ids);
      }
    });
    sb.from('medications').select('*').eq('dog_id',dogId).then(({data})=>{
      if(data?.length)setMeds(data.map(m=>({id:m.id,name:m.name,dose:m.dose||"",frequency:m.frequency||"",nextDue:m.next_due||""})));
    });
    sb.from('vet_info').select('*').eq('dog_id',dogId).maybeSingle().then(({data})=>{
      if(data){setVet({name:data.name||"",phone:data.phone||"",address:data.address||"",nextAppt:data.next_appt||"",reason:""});setVetDbId(data.id);}
    });
    sb.from('health_logs').select('*').eq('dog_id',dogId).order('created_at',{ascending:false}).then(({data})=>{
      if(data?.length)setLogs(data.map(l=>({id:l.id,category:l.mood||"Health",note:l.note,date:l.date})));
    });
    sb.from('weight_logs').select('*').eq('dog_id',dogId).order('created_at',{ascending:false}).then(({data})=>{
      if(data?.length)setWeightLogs(data.map(w=>({id:w.id,weight:w.weight,date:w.date,notes:w.notes||""})));
    });
    sb.from('checkins').select('*').eq('dog_id',dogId).order('date',{ascending:false}).then(({data})=>{
      if(data?.length)setCheckins(data);
    });
    sb.from('milestones').select('*').eq('dog_id',dogId).order('date',{ascending:false}).then(({data})=>{
      if(data?.length)setMilestones(data);
    });
  },[sb,dogId]);

  // Save progress banner state
  const [showSaveBanner,setShowSaveBanner]=useState(false);
  const [saveEmail,setSaveEmail]=useState("");
  const [savePassword,setSavePassword]=useState("");
  const [saving,setSaving]=useState(false);
  const [saveError,setSaveError]=useState("");
  const [savedOk,setSavedOk]=useState(false);

  // Show banner after first real AI reply if not logged in
  useEffect(()=>{
    if(!user&&!dogId&&msgs.length>=2&&!savedOk)setShowSaveBanner(true);
  },[msgs.length]);

  // Rating prompt: show after 5 AI replies if not yet dismissed
  useEffect(()=>{
    const aiCount=msgs.filter(m=>m.from==="ai").length;
    if(aiCount>=5&&!ratingDismissed&&user)setShowRatingPrompt(true);
  },[msgs.length]);

  const saveProgress=async()=>{
    if(!sb||!saveEmail||!savePassword)return;
    setSaving(true);setSaveError("");
    try{
      const{data,error:signUpErr}=await sb.auth.signUp({email:saveEmail,password:savePassword});
      if(signUpErr)throw signUpErr;
      const uid=data.user?.id;
      if(!uid)throw new Error("Signup succeeded but no user returned. Check your email to confirm.");
      const{data:dogData}=await sb.from('dogs').insert({user_id:uid,name:dog.name,breed:dog.breed,age:dog.age,weight:dog.weight,sex:dog.sex,traits:dog.traits||[]}).select().single();
      if(dogData){
        await sb.from('vaccines').insert(vaccines.map(v=>({dog_id:dogData.id,name:v.name,required:v.required,frequency:v.frequency,last_given:v.lastGiven||"",next_due:v.nextDue||"",notes:v.notes||""})));
        if(meds.length)await sb.from('medications').insert(meds.map(m=>({dog_id:dogData.id,name:m.name,dose:m.dose,frequency:m.frequency,next_due:m.nextDue||""})));
        if(vet.name)await sb.from('vet_info').insert({dog_id:dogData.id,name:vet.name,phone:vet.phone,address:vet.address,next_appt:vet.nextAppt});
        if(logs.length)await sb.from('health_logs').insert(logs.map(l=>({dog_id:dogData.id,note:l.note,mood:l.category,date:l.date})));
        onSaveComplete&&onSaveComplete(dogData.id,data.user,dogData);
      }
      setSavedOk(true);setShowSaveBanner(false);
    }catch(e){setSaveError(e.message);}
    finally{setSaving(false);}
  };

  // Weight tracking
  const [weightLogs,setWeightLogs]=useState([]);
  const [newWeight,setNewWeight]=useState("");
  const [weightNote,setWeightNote]=useState("");

  // Daily check-in
  const [checkins,setCheckins]=useState([]);
  const todayStr=new Date().toISOString().split('T')[0];
  const todayCheckin=checkins.find(c=>c.date===todayStr)||null;
  const streak=useMemo(()=>{
    if(!checkins.length)return 0;
    const sorted=[...checkins].sort((a,b)=>new Date(b.date)-new Date(a.date));
    let s=0,d=new Date();
    for(const c of sorted){
      const cd=new Date(c.date);const diff=Math.round((new Date(d.toISOString().split('T')[0])-new Date(c.date))/(86400000));
      if(diff>1)break;
      s++;d=cd;
    }
    return s;
  },[checkins]);

  // Symptom checker
  const [symptomInput,setSymptomInput]=useState("");
  const [symptomResult,setSymptomResult]=useState(null);
  const [symptomLoading,setSymptomLoading]=useState(false);

  // Food calculator
  const [foodCalPerCup,setFoodCalPerCup]=useState("");
  const [showFoodCalc,setShowFoodCalc]=useState(false);
  const foodPortions=useMemo(()=>{
    const w=parseInt(dog.weight)||20,a=parseInt(dog.age)||3,cal=parseInt(foodCalPerCup)||400;
    const rer=70*Math.pow(w*0.453592,0.75);
    const factor=a<1?3:a>7?1.2:1.6;
    const dailyCal=Math.round(rer*factor);
    const cups=(dailyCal/cal).toFixed(1);
    return{dailyCal,cups,morning:(dailyCal/cal/2).toFixed(1),evening:(dailyCal/cal/2).toFixed(1)};
  },[dog.weight,dog.age,foodCalPerCup]);

  // Milestones
  const [milestones,setMilestones]=useState([]);
  const [showMilestoneForm,setShowMilestoneForm]=useState(false);
  const [showShareCard,setShowShareCard]=useState(false);
  const [showRatingPrompt,setShowRatingPrompt]=useState(false);
  const [ratingDismissed,setRatingDismissed]=useState(()=>localStorage.getItem('db_rating_done')==='1');
  const [newMilestone,setNewMilestone]=useState({title:"",date:"",emoji:"🎉"});

  // Birthday
  const [birthday,setBirthday]=useState(dog.birthday||"");
  const bdayInfo=useMemo(()=>getBirthdayInfo(birthday),[birthday]);
  const careCalendar=useMemo(()=>getCareCalendar(dog),[dog]);
  const [checkedCare,setCheckedCare]=useState({});

  // Push notifications setup
  useEffect(()=>{
    if(!user||!dogId||!('serviceWorker' in navigator)||!('PushManager' in window))return;
    const setup=async()=>{
      try{
        const reg=await navigator.serviceWorker.register('/sw.js');
        const perm=await Notification.requestPermission();
        if(perm!=='granted')return;
        const {supabaseKey}=await fetch('/api/config').then(r=>r.json());
        // Get VAPID public key
        const existing=await reg.pushManager.getSubscription();
        const sub=existing||await reg.pushManager.subscribe({
          userVisibleOnly:true,
          applicationServerKey:supabaseKey ? urlBase64ToUint8Array('BIbMGMOgEh1EqgwdsiEwzhyKLbyGUSpTTE7S5TNto2EaGDBO1H3OYok17VzHXqRkDbRmZFxYAmmH6UA1ZbhE-Mw') : null
        });
        if(sub){
          await fetch('/api/push-subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub.toJSON(),userId:user.id,dogId})});
        }
      }catch(e){console.log('Push setup:',e.message);}
    };
    setup();
  },[user,dogId]);

  // Dog photo
  const [dogPhoto,setDogPhoto]=useState(dog.photo_url||null);
  const photoInputRef=useRef(null);
  const uploadPhoto=async(e)=>{
    const file=e.target.files?.[0];if(!file||!sb||!dogId)return;
    const ext=file.name.split('.').pop();
    const path=`${dogId}/avatar.${ext}`;
    const{error}=await sb.storage.from('dog-photos').upload(path,file,{upsert:true,contentType:file.type});
    if(!error){
      const{data}=sb.storage.from('dog-photos').getPublicUrl(path);
      const url=data.publicUrl;
      await sb.from('dogs').update({photo_url:url}).eq('id',dogId);
      setDogPhoto(url);
    }
    e.target.value="";
  };

  const products=useMemo(()=>getProducts(dog),[dog]);
  const filteredProducts=shopFilter==="All"?products:products.filter(p=>p.cat===shopFilter);
  const shopCats=["All",...Array.from(new Set(products.map(p=>p.cat)))];
  const healthScore=useMemo(()=>calcHealthScore(vaccines,vet,meds,logs),[vaccines,vet,meds,logs]);
  const tip=useMemo(()=>getDailyTip(dog),[dog]);
  const breedFact=useMemo(()=>getBreedFact(dog.breed),[dog.breed]);
  const hy=useMemo(()=>humanYears(dog.age,dog.weight),[dog]);
  const overdue=vaccines.filter(v=>v.nextDue&&(new Date(v.nextDue)-new Date())<0);
  const dueSoon=vaccines.filter(v=>{if(!v.nextDue)return false;const d=(new Date(v.nextDue)-new Date())/86400000;return d>=0&&d<30;});
  const dogE=dog.sex==="female"?"🐕‍🦺":"🐕";

  const [pendingImage,setPendingImage]=useState(null); // {base64, type, preview}
  const fileInputRef=useRef(null);

  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  const handleImageSelect=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const dataUrl=ev.target.result;
      const base64=dataUrl.split(',')[1];
      setPendingImage({base64,type:file.type,preview:dataUrl});
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  const sendMsg=(text)=>{
    const msg=text||input.trim();
    if(!msg&&!pendingImage)return;
    const userMsg={from:"user",text:msg||"📷 Photo sent",image:pendingImage?.preview||null};
    setMsgs(m=>[...m,userMsg]);setInput("");setTyping(true);
    const body={message:msg||"What do you see in this photo? Give me advice based on my dog.",dog};
    if(pendingImage){body.imageBase64=pendingImage.base64;body.imageType=pendingImage.type;}
    setPendingImage(null);
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(r=>r.json())
      .then(data=>{setTyping(false);setMsgs(m=>[...m,{from:"ai",text:data.text||"Sorry, I had trouble with that. Try again?"}]);})
      .catch(()=>{setTyping(false);setMsgs(m=>[...m,{from:"ai",text:"Connection issue — please try again."}]);});
  };

  const bold=(t)=>t.split(/(\*\*[^*]+\*\*)/).map((p,i)=>p.startsWith("**")&&p.endsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p);

  const suggs=[`Why does ${dog.name} bark at strangers?`,`Best food for a ${dog.breed}?`,`How do I calm ${dog.name}?`,`How much exercise for ${dog.name}?`,`Is ${dog.name} drinking enough water?`];

  // Score ring
  const r=44,cx=52,cy=52,circ=2*Math.PI*r;
  const offset=circ*(1-healthScore/100);

  return(
    <div className="app">
      {/* TOP HEADER */}
      <div className="top-header">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"#fef3c7",border:"2px solid #f59e0b",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              {dogPhoto?<img src={dogPhoto} alt={dog.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:dogE}
            </div>
            <div>
              <div style={{fontWeight:800,fontSize:15,letterSpacing:"-0.3px"}}>{dog.name}</div>
              <div style={{fontSize:11,color:"#a8a29e"}}>{dog.breed}{dog.age?` · ${dog.age} yrs`:""}{dog.weight?` · ${dog.weight} lbs`:""}</div>
            </div>
            {dogs?.length>1&&(
              <div style={{display:"flex",gap:4,marginLeft:4}}>
                {dogs.map((d,i)=>(
                  <button key={d.id||i} onClick={()=>onSwitchDog&&onSwitchDog(d)} style={{width:8,height:8,borderRadius:"50%",border:"none",cursor:"pointer",padding:0,background:d.id===dog.id?"#f59e0b":"#e7dfc8",transition:"all .2s"}}/>
                ))}
              </div>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {(overdue.length>0||dueSoon.length>0)&&(
              <div onClick={()=>setTab("health")} style={{background:overdue.length>0?"#fee2e2":"#fef3c7",color:overdue.length>0?"#991b1b":"#92400e",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                {overdue.length>0?`⚠️ ${overdue.length} overdue`:`📅 ${dueSoon.length} due soon`}
              </div>
            )}
            <span style={{fontSize:20}}>🐾</span>
          </div>
        </div>
      </div>

      {/* SAVE PROGRESS BANNER */}
      {showSaveBanner&&!user&&(
        <div className="fade-in" style={{background:"linear-gradient(135deg,#1c1917,#292524)",padding:"14px 16px",borderBottom:"1px solid #3d3530"}}>
          {!savedOk&&<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div><div style={{fontSize:13,fontWeight:800,color:"#f59e0b",marginBottom:2}}>💾 Save your progress</div><div style={{fontSize:12,color:"rgba(255,255,255,.65)"}}>Create a free account to keep {dog.name}'s data.</div></div>
              <button onClick={()=>setShowSaveBanner(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,.4)",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
            </div>
            {saveError&&<div style={{background:"#fee2e2",color:"#991b1b",borderRadius:8,padding:"8px 10px",fontSize:12,fontWeight:600,marginBottom:8}}>{saveError}</div>}
            <div style={{display:"flex",gap:7,marginBottom:7}}>
              <input style={{flex:1,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,padding:"8px 11px",fontSize:12,color:"#fff",fontFamily:"inherit",outline:"none"}} type="email" placeholder="Email" value={saveEmail} onChange={e=>setSaveEmail(e.target.value)}/>
              <input style={{flex:1,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,padding:"8px 11px",fontSize:12,color:"#fff",fontFamily:"inherit",outline:"none"}} type="password" placeholder="Password" value={savePassword} onChange={e=>setSavePassword(e.target.value)}/>
            </div>
            <button onClick={saveProgress} disabled={saving||!saveEmail||!savePassword} style={{width:"100%",background:"#f59e0b",border:"none",borderRadius:8,padding:"9px",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer",opacity:saving?.6:1,fontFamily:"inherit"}}>
              {saving?"Saving...":"Save My Progress →"}
            </button>
          </>}
        </div>
      )}

      {/* CONTENT */}
      <div className="app-content">

        {/* ── HOME TAB ── */}
        {tab==="home"&&<div style={{paddingTop:16}}>
          {/* HEALTH SCORE CARD */}
          <div className="gradient-card fade-up">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.7)",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Health Score</div>
                <div style={{fontSize:44,fontWeight:900,letterSpacing:"-2px",color:"#fff",lineHeight:1}}>{healthScore}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,.85)",marginTop:4,fontWeight:600}}>{scoreLabel(healthScore)}</div>
                {hy>0&&<div style={{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:6}}>≈ {hy} in human years</div>}
                {streak>0&&<div style={{fontSize:12,color:"rgba(255,255,255,.85)",marginTop:4,fontWeight:700}}>🔥 {streak} day streak</div>}
              </div>
              <svg width={104} height={104} viewBox="0 0 104 104">
                <circle className="score-track" cx={cx} cy={cy} r={r}/>
                <circle className="score-fill" cx={cx} cy={cy} r={r} stroke={healthScore>=80?"#ffffff":healthScore>=60?"#fde68a":"#fca5a5"} strokeDasharray={circ} strokeDashoffset={offset} transform={`rotate(-90 ${cx} ${cy})`}/>
                <text x={cx} y={cy+2} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="18" fontWeight="800">{dogE}</text>
              </svg>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
              {[
                ["💉",`${vaccines.filter(v=>v.nextDue).length}/${vaccines.length}`,"Vaccines"],
                ["🏥",vet.name?"Set":"—","Vet"],
                ["📋",logs.length,"Log entries"],
              ].map(([e,v,l])=>(
                <div key={l} className="stat-mini" style={{textAlign:"center"}}><div style={{fontSize:16}}>{e}</div><div style={{color:"#fff",fontWeight:800,fontSize:15,marginTop:2}}>{v}</div><div style={{color:"rgba(255,255,255,.7)",fontSize:10.5,marginTop:1}}>{l}</div></div>
              ))}
            </div>
          </div>

          {/* BIRTHDAY BANNER */}
          {bdayInfo&&(bdayInfo.isToday||bdayInfo.isSoon)&&(
            <div className="fade-up" style={{margin:"0 16px 14px",background:bdayInfo.isToday?"linear-gradient(135deg,#f59e0b,#d97706)":"#fff",borderRadius:18,padding:"16px 18px",border:bdayInfo.isToday?"none":"2px solid #f59e0b"}}>
              <div style={{fontSize:28,marginBottom:6}}>{bdayInfo.isToday?"🎂":"🎁"}</div>
              <div style={{fontWeight:800,fontSize:16,color:bdayInfo.isToday?"#fff":"#1c1917",marginBottom:4}}>{bdayInfo.isToday?`Happy Birthday, ${dog.name}! 🎉`:`${dog.name}'s birthday is in ${bdayInfo.days} day${bdayInfo.days===1?"":"s"}!`}</div>
              <p style={{fontSize:13,color:bdayInfo.isToday?"rgba(255,255,255,.85)":"#78350f"}}>{bdayInfo.isToday?"Give them some extra love today 🐾":`Coming up on ${new Date(birthday).toLocaleDateString("en-US",{month:"long",day:"numeric"})}`}</p>
            </div>
          )}

          {/* ALERTS */}
          {(overdue.length>0||dueSoon.length>0||vet.nextAppt)&&(
            <>
              <div className="section-label">🔔 UPCOMING</div>
              <div style={{margin:"0 16px 14px",display:"flex",flexDirection:"column",gap:8}}>
                {overdue.map(v=>(
                  <div key={v.id} onClick={()=>{setTab("health");}} style={{background:"#fee2e2",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
                    <div><div style={{fontSize:12,fontWeight:700,color:"#991b1b"}}>⚠️ OVERDUE</div><div style={{fontWeight:600,fontSize:14,marginTop:2}}>{v.name}</div></div>
                    <span style={{color:"#dc2626",fontSize:20}}>›</span>
                  </div>
                ))}
                {dueSoon.filter(v=>!overdue.find(o=>o.id===v.id)).map(v=>(
                  <div key={v.id} onClick={()=>setTab("health")} style={{background:"#fef3c7",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
                    <div><div style={{fontSize:12,fontWeight:700,color:"#92400e"}}>📅 DUE SOON</div><div style={{fontWeight:600,fontSize:14,marginTop:2}}>{v.name}</div></div>
                    <span style={{color:"#d97706",fontSize:20}}>›</span>
                  </div>
                ))}
                {vet.nextAppt&&(
                  <div onClick={()=>setTab("health")} style={{background:"#dcfce7",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
                    <div><div style={{fontSize:12,fontWeight:700,color:"#166534"}}>🏥 VET APPOINTMENT</div><div style={{fontWeight:600,fontSize:14,marginTop:2}}>{new Date(vet.nextAppt).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}{vet.reason?` · ${vet.reason}`:""}</div></div>
                    <span style={{color:"#16a34a",fontSize:20}}>›</span>
                  </div>
                )}
              </div>
            </>
          )}

          {/* QUICK ACTIONS */}
          <div className="section-label">⚡ QUICK ACTIONS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"0 16px 14px"}}>
            {[
              {e:"💬",l:"Ask AI",sub:"Get answers now",t:"chat"},
              {e:"🏥",l:"Health Hub",sub:`${overdue.length>0?`${overdue.length} overdue`:"All tracked"}`,t:"health"},
              {e:"🛍️",l:"Shop",sub:"AI product picks",t:"shop"},
              {e:"📋",l:"Log",sub:`${logs.length} entries`,t:"log"},
            ].map(a=>(
              <div key={a.l} className="quick-action" onClick={()=>setTab(a.t)}>
                <div style={{fontSize:28}}>{a.e}</div>
                <div style={{fontWeight:700,fontSize:13.5}}>{a.l}</div>
                <div style={{fontSize:11,color:"#a8a29e"}}>{a.sub}</div>
              </div>
            ))}
          </div>

          {/* DAILY CHECK-IN */}
          <div className="section-label">📅 DAILY CHECK-IN</div>
          <div className="card-section fade-up" style={{margin:"0 16px 14px"}}>
            <div style={{padding:"16px 18px"}}>
              {todayCheckin?(
                <div style={{textAlign:"center",padding:"8px 0"}}>
                  <div style={{fontSize:32,marginBottom:6}}>{todayCheckin.mood==="great"?"🤩":todayCheckin.mood==="good"?"😊":todayCheckin.mood==="okay"?"😐":todayCheckin.mood==="off"?"😟":"🤒"}</div>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{dog.name} is {todayCheckin.mood} today</div>
                  {streak>0&&<div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#fef3c7",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:700,color:"#92400e"}}>🔥 {streak} day streak</div>}
                </div>
              ):(
                <>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>How is {dog.name} today?</div>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    {[["great","🤩"],["good","😊"],["okay","😐"],["off","😟"],["sick","🤒"]].map(([m,e])=>(
                      <button key={m} onClick={async()=>{
                        const entry={date:todayStr,mood:m,id:Date.now()};
                        setCheckins(c=>[entry,...c]);
                        if(sb&&dogId)await sb.from('checkins').insert({dog_id:dogId,date:todayStr,mood:m});
                      }} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"#fffbeb",border:"1.5px solid #f0e8d6",borderRadius:12,padding:"10px 8px",cursor:"pointer",flex:1,margin:"0 3px",fontFamily:"inherit",transition:"all .15s"}}>
                        <span style={{fontSize:22}}>{e}</span>
                        <span style={{fontSize:10,fontWeight:700,color:"#78350f",textTransform:"capitalize"}}>{m}</span>
                      </button>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>

          {/* FOOD CALCULATOR */}
          <div className="section-label">🥣 FOOD CALCULATOR</div>
          <div className="card-section fade-up" style={{margin:"0 16px 14px"}}>
            <div style={{padding:"16px 18px"}}>
              {!showFoodCalc?(
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div><div style={{fontWeight:700,fontSize:14,marginBottom:2}}>Daily portion calculator</div><div style={{fontSize:12,color:"#a8a29e"}}>Enter your food's calories per cup</div></div>
                  <button className="btn-sm" onClick={()=>setShowFoodCalc(true)}>Calculate</button>
                </div>
              ):(
                <div className="fade-in">
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:12,fontWeight:700,color:"#78350f",display:"block",marginBottom:5}}>Calories per cup (check the bag)</label>
                    <input className="input" type="number" placeholder="e.g. 400" value={foodCalPerCup} onChange={e=>setFoodCalPerCup(e.target.value)}/>
                  </div>
                  {foodCalPerCup&&(
                    <div className="fade-in" style={{background:"#fef3c7",borderRadius:12,padding:"14px"}}>
                      <div style={{fontWeight:800,fontSize:15,marginBottom:10}}>{dog.name}'s daily portions</div>
                      {[["Total daily","≈ "+foodPortions.cups+" cups","🥣"],["Morning meal","≈ "+foodPortions.morning+" cups","☀️"],["Evening meal","≈ "+foodPortions.evening+" cups","🌙"],["Daily calories","≈ "+foodPortions.dailyCal+" kcal","🔥"]].map(([l,v,e])=>(
                        <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(245,158,11,.2)"}}>
                          <span style={{fontSize:13,color:"#78350f"}}>{e} {l}</span>
                          <span style={{fontWeight:700,fontSize:14,color:"#1c1917"}}>{v}</span>
                        </div>
                      ))}
                      <p style={{fontSize:11,color:"#92400e",marginTop:8}}>Based on {dog.name}'s weight & age. Adjust ±10% based on body condition.</p>
                    </div>
                  )}
                  <button className="btn-ghost-sm" style={{marginTop:10}} onClick={()=>{setShowFoodCalc(false);setFoodCalPerCup("");}}>Close</button>
                </div>
              )}
            </div>
          </div>

          {/* DAILY TIP */}
          <div className="section-label">💡 TODAY'S TIP</div>
          <div className="tip-card fade-up">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:28}}>{tip.emoji}</span>
              <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>{tip.title}</div>
            </div>
            <p style={{fontSize:14,color:"rgba(255,255,255,.85)",lineHeight:1.65}}>{tip.text}</p>
          </div>

          {/* BREED FACT */}
          <div className="section-label">🐶 BREED SPOTLIGHT</div>
          <div className="card-section fade-up">
            <div style={{padding:"16px 18px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>{dog.breed}</div>
              <p style={{fontSize:14,color:"#44403c",lineHeight:1.65}}>{breedFact}</p>
            </div>
          </div>

          {/* EMERGENCY */}
          <div style={{margin:"0 16px 24px"}}>
            <a href="https://www.google.com/search?q=emergency+vet+near+me" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",display:"block"}}>
              <button className="emergency-btn">
                <span style={{fontSize:20}}>🚨</span> Emergency Vet Finder <span style={{fontSize:14}}>→</span>
              </button>
            </a>
            <p style={{fontSize:11,color:"#a8a29e",textAlign:"center",marginTop:8}}>Opens Google Maps search for emergency vets near you</p>
          </div>
        </div>}

        {/* ── CHAT TAB ── */}
        {tab==="chat"&&<>
          <div style={{minHeight:"calc(100vh - 200px)"}}>
            <div className="chat-messages">
              {msgs.length===1&&<div className="fade-in" style={{display:"flex",flexWrap:"wrap",gap:7}}>{suggs.map(s=><span key={s} className="chip" onClick={()=>sendMsg(s)}>{s}</span>)}</div>}
              {msgs.map((m,i)=>(
                <div key={i} className={`fade-in ${m.from==="user"?"bubble-user":"bubble-ai"}`} style={{alignSelf:m.from==="user"?"flex-end":"flex-start",whiteSpace:"pre-wrap"}}>
                  {m.image&&<img src={m.image} alt="uploaded" style={{display:"block",maxWidth:"100%",borderRadius:10,marginBottom:m.text&&m.text!=="📷 Photo sent"?6:0,maxHeight:200,objectFit:"cover"}}/>}
                  {m.text&&m.text!=="📷 Photo sent"&&bold(m.text)}
                </div>
              ))}
              {typing&&<div className="bubble-ai fade-in" style={{alignSelf:"flex-start",padding:"14px 18px"}}><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>}
              <div ref={msgEnd}/>
            </div>
          </div>
          <div className="chat-input-bar" style={{flexDirection:"column",gap:0}}>
            {pendingImage&&(
              <div className="fade-in" style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,background:"#fef3c7",borderRadius:10,padding:"6px 10px"}}>
                <img src={pendingImage.preview} alt="preview" style={{width:40,height:40,borderRadius:7,objectFit:"cover",flexShrink:0}}/>
                <span style={{fontSize:12,color:"#78350f",fontWeight:600,flex:1}}>Photo ready — add a message or send now</span>
                <button onClick={()=>setPendingImage(null)} style={{background:"none",border:"none",color:"#a8a29e",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
              </div>
            )}
            <div style={{display:"flex",gap:9,alignItems:"flex-end",width:"100%"}}>
              <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleImageSelect}/>
              <button onClick={()=>fileInputRef.current?.click()} disabled={typing} style={{width:42,height:42,borderRadius:50,background:"#f0e8d6",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#78350f" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </button>
              <textarea className="chat-textarea" rows={1} placeholder={`Ask anything about ${dog.name}...`} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}} disabled={typing}/>
              <button className="send-btn" onClick={()=>sendMsg()} disabled={(!input.trim()&&!pendingImage)||typing}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </button>
            </div>
          </div>
        </>}

        {/* ── HEALTH TAB ── */}
        {tab==="health"&&<div style={{padding:"16px 0 24px"}}>
          {/* VET INFO */}
          <div className="section-label">🏥 VET INFORMATION</div>
          <div className="card-section">
            <div style={{padding:18}}>
              {!editVet?(
                !vet.name?(
                  <div style={{textAlign:"center",padding:"16px 0"}}>
                    <div style={{fontSize:36,marginBottom:10}}>🏥</div>
                    <p style={{fontSize:13.5,color:"#a8a29e",marginBottom:14}}>Add your vet's info to track appointments.</p>
                    <button className="btn-sm" onClick={()=>setEditVet(true)}>+ Add Vet Info</button>
                  </div>
                ):(
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div><div style={{fontWeight:700,fontSize:15}}>{vet.name}</div>{vet.phone&&<div style={{fontSize:13,color:"#57534e",marginTop:3}}>📞 <a href={`tel:${vet.phone}`} style={{color:"#57534e",textDecoration:"none"}}>{vet.phone}</a></div>}{vet.address&&<div style={{fontSize:13,color:"#57534e",marginTop:2}}>📍 {vet.address}</div>}</div>
                      <div style={{display:"flex",gap:6,flexDirection:"column",alignItems:"flex-end"}}>
                        <button className="btn-ghost-sm" onClick={()=>setEditVet(true)}>Edit</button>
                        <a href={vet.website||`https://www.google.com/search?q=${encodeURIComponent((vet.name||"vet")+" appointment booking")}`} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}><button className="btn-sm">Book →</button></a>
                      </div>
                    </div>

function ReferralButton({user,dog}){
  const [copied,setCopied]=useState(false);
  const refCode=user?btoa(user.id).replace(/[^a-zA-Z0-9]/g,'').slice(0,8):null;
  const refUrl=refCode?`${window.location.origin}?ref=${refCode}`:`${window.location.origin}`;
  const refText=`I use Dog Boy to track ${dog?.name||"my dog"}'s health with AI 🐾 Try it free →`;

  const share=async()=>{
    if(navigator.share){
      try{await navigator.share({title:"Dog Boy — AI Dog Companion",text:refText,url:refUrl});return;}
      catch(e){if(e.name==='AbortError')return;}
    }
    await navigator.clipboard.writeText(`${refText} ${refUrl}`);
    setCopied(true);setTimeout(()=>setCopied(false),2500);
  };

  return(
    <button onClick={share} style={{width:"100%",background:copied?"#ecfdf5":"#fffbeb",border:`2px solid ${copied?"#10b981":"#e7dfc8"}`,borderRadius:12,padding:"11px",fontFamily:"inherit",fontWeight:600,fontSize:14,color:copied?"#065f46":"#78350f",cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      {copied?"✓ Link Copied!":"🔗 Invite a Friend"}
    </button>
  );
}

// ──────────────────────────────────────────────
function ShareCard({dog,healthScore,dogPhoto,onClose}){
  const cardRef=useRef(null);
  const [sharing,setSharing]=useState(false);
  const [copied,setCopied]=useState(false);
  const dogE=dog.sex==="female"?"🐕‍🦺":"🐕";
  const scoreColor=healthScore>=80?"#10b981":healthScore>=60?"#f59e0b":"#ef4444";
  const shareUrl=window.location.origin;
  const shareText=`${dog.name} has a ${healthScore}/100 health score on Dog Boy 🐾 The AI app that actually knows your dog. Check it out →`;

  const downloadCard=async()=>{
    if(!cardRef.current||!window.html2canvas)return;
    setSharing(true);
    try{
      const canvas=await html2canvas(cardRef.current,{scale:2,useCORS:true,backgroundColor:null});
      const link=document.createElement('a');
      link.download=`${dog.name}-dogboy.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    }catch(e){console.error(e);}
    setSharing(false);
  };

  const nativeShare=async()=>{
    if(!cardRef.current)return;
    setSharing(true);
    try{
      if(window.html2canvas){
        const canvas=await html2canvas(cardRef.current,{scale:2,useCORS:true,backgroundColor:null});
        canvas.toBlob(async blob=>{
          const file=new File([blob],`${dog.name}-dogboy.png`,{type:'image/png'});
          if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
            await navigator.share({files:[file],title:`${dog.name} on Dog Boy`,text:shareText});
          } else if(navigator.share){
            await navigator.share({title:`${dog.name} on Dog Boy`,text:shareText,url:shareUrl});
          } else {
            await navigator.clipboard.writeText(`${shareText} ${shareUrl}`);
            setCopied(true);setTimeout(()=>setCopied(false),2500);
          }
        },'image/png');
      }
    }catch(e){if(e.name!=='AbortError')console.error(e);}
    setSharing(false);
  };

  const copyLink=async()=>{
    await navigator.clipboard.writeText(`${shareText} ${shareUrl}`);
    setCopied(true);setTimeout(()=>setCopied(false),2500);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:9000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      {/* The card itself */}
      <div ref={cardRef} style={{width:320,background:"linear-gradient(145deg,#1c1917 0%,#292524 100%)",borderRadius:24,padding:28,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:"rgba(245,158,11,.08)"}}/>
        <div style={{position:"absolute",bottom:-30,left:-30,width:120,height:120,borderRadius:"50%",background:"rgba(245,158,11,.05)"}}/>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20,position:"relative"}}>
          <div style={{width:64,height:64,borderRadius:"50%",border:"3px solid #f59e0b",overflow:"hidden",background:"#fef3c7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,flexShrink:0}}>
            {dogPhoto?<img src={dogPhoto} alt={dog.name} style={{width:"100%",height:"100%",objectFit:"cover"}} crossOrigin="anonymous"/>:dogE}
          </div>
          <div>
            <div style={{fontWeight:900,fontSize:22,color:"#fff",letterSpacing:"-0.5px"}}>{dog.name}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:2}}>{dog.breed}{dog.age?` · ${dog.age} yrs`:""}</div>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,.05)",borderRadius:16,padding:"16px 18px",marginBottom:16,position:"relative"}}>
          <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".8px",marginBottom:6}}>Health Score</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
            <div style={{fontSize:52,fontWeight:900,color:scoreColor,lineHeight:1,letterSpacing:"-2px"}}>{healthScore}</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,.5)",marginBottom:6}}>/100</div>
          </div>
          <div style={{height:6,background:"rgba(255,255,255,.1)",borderRadius:99,marginTop:10,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${healthScore}%`,background:`linear-gradient(90deg,${scoreColor},${scoreColor}cc)`,borderRadius:99}}/>
          </div>
        </div>
        {dog.traits?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16,position:"relative"}}>
          {dog.traits.slice(0,4).map(t=><span key={t} style={{background:"rgba(245,158,11,.15)",color:"#f59e0b",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600}}>{t}</span>)}
        </div>}
        <div style={{display:"flex",alignItems:"center",gap:6,position:"relative"}}>
          <span style={{fontSize:16}}>🐾</span>
          <span style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,.5)"}}>Dog Boy — AI Dog Companion</span>
        </div>
      </div>

      {/* Actions */}
      <div style={{width:320,marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={nativeShare} disabled={sharing} style={{background:"#f59e0b",border:"none",borderRadius:12,padding:"14px",fontFamily:"inherit",fontWeight:700,fontSize:15,color:"#fff",cursor:"pointer",opacity:sharing?.6:1}}>
          {sharing?"Generating...":"📤 Share Card"}
        </button>
        <div style={{display:"flex",gap:8}}>
          <button onClick={downloadCard} disabled={sharing} style={{flex:1,background:"rgba(255,255,255,.1)",border:"none",borderRadius:12,padding:"12px",fontFamily:"inherit",fontWeight:600,fontSize:13,color:"#fff",cursor:"pointer"}}>
            ⬇️ Save Image
          </button>
          <button onClick={copyLink} style={{flex:1,background:copied?"rgba(16,185,129,.2)":"rgba(255,255,255,.1)",border:"none",borderRadius:12,padding:"12px",fontFamily:"inherit",fontWeight:600,fontSize:13,color:copied?"#10b981":"#fff",cursor:"pointer",transition:"all .2s"}}>
            {copied?"✓ Copied!":"🔗 Copy Link"}
          </button>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.5)",fontSize:13,cursor:"pointer",padding:"8px",fontFamily:"inherit"}}>Close</button>
      </div>
    </div>
  );
}

function urlBase64ToUint8Array(b){const p=b.replace(/-/g,'+').replace(/_/g,'/');const r='='.repeat((4-p.length%4)%4);const raw=atob(p+r);return Uint8Array.from(raw,c=>c.charCodeAt(0));}

// ──────────────────────────────────────────────
// APP ROOT
// ──────────────────────────────────────────────
function App(){
  const [showSplash,setShowSplash]=useState(true);
  const [page,setPage]=useState("loading");
  const [dog,setDog]=useState(null);
  const [dogId,setDogId]=useState(null);
  const [dogs,setDogs]=useState([]);
  const [user,setUser]=useState(null);
  const [sb,setSb]=useState(null);
  const [pendingDog,setPendingDog]=useState(null);

  useEffect(()=>{
    fetch('/api/config').then(r=>r.json()).then(({supabaseUrl,supabaseKey})=>{
      if(!supabaseUrl||!supabaseKey){setPage("landing");return;}
      const client=supabase.createClient(supabaseUrl,supabaseKey);
      setSb(client);
      client.auth.getSession().then(({data:{session}})=>{
        if(session){setUser(session.user);loadDog(client,session.user.id);}
        else{setPage("landing");}
      });
      client.auth.onAuthStateChange((event,session)=>{
        if(event==="SIGNED_OUT"){setDog(null);setDogId(null);setUser(null);setPage("landing");}
      });
    }).catch(()=>setPage("landing"));
  },[]);

  const loadDog=async(client,userId)=>{
    const{data}=await client.from('dogs').select('*').eq('user_id',userId).order('created_at',{ascending:true});
    if(data?.length){setDogs(data);setDog(data[0]);setDogId(data[0].id);setPage("dashboard");}
    else{setPage("onboarding");}
  };

  const switchDog=(d)=>{setDog(d);setDogId(d.id);};

  const logout=async()=>{
    if(sb)await sb.auth.signOut();
  };

  if(page==="loading")return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#fffbeb"}}>
      <div style={{fontSize:40}}>🐾</div>
    </div>
  );

  return(
    <>
      {showSplash&&<Splash done={()=>setShowSplash(false)}/>}
      {page==="landing"&&<Landing onStart={()=>setPage("onboarding")}/>}
      {page==="onboarding"&&<Onboarding onDone={async d=>{
        setPendingDog(d);setDog(d);
        if(sb&&user){
          const{data}=await sb.from('dogs').insert({user_id:user.id,name:d.name,breed:d.breed,age:d.age,weight:d.weight,sex:d.sex,traits:d.traits||[]}).select().single();
          if(data){
            await sb.from('vaccines').insert(DEFAULT_VACCINES.map(v=>({dog_id:data.id,name:v.name,required:v.required,frequency:v.frequency,last_given:"",next_due:"",notes:""})));
            setDogs(prev=>[...prev,data]);setDog(data);setDogId(data.id);
          }
          setPage("dashboard");
        } else {
          setPage(sb?"account-setup":"dashboard");
        }
      }}/>}
      {page==="account-setup"&&pendingDog&&sb&&<AccountSetup dog={pendingDog} sb={sb} onSaved={(dogData,u)=>{setDog(dogData);setDogId(dogData.id);setUser(u);setPage("dashboard");}} onSkip={()=>setPage("dashboard")}/>}
      {page==="dashboard"&&dog&&<Dashboard dog={dog} dogId={dogId} sb={sb} user={user} dogs={dogs} onSwitchDog={switchDog} onReset={()=>setPage("onboarding")} onLogout={logout} onSaveComplete={(id,u,dogData)=>{setDogId(id);setUser(u);if(dogData){setDogs([dogData]);setDog(dogData);}}}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
